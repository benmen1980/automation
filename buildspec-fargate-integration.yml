version: 0.2

env:
  variables:
    INTEGRATION_NAME: gmail-priority
    IMAGE_REPO_NAME: automation-integration

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - npm ci --ignore-scripts
  pre_build:
    commands:
      - npm --workspace "@automation/${INTEGRATION_NAME}" test
      - aws ecr get-login-password | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
  build:
    commands:
      - docker build --build-arg INTEGRATION_NAME="$INTEGRATION_NAME" -t "$IMAGE_REPO_NAME:$CODEBUILD_RESOLVED_SOURCE_VERSION" .
      - docker tag "$IMAGE_REPO_NAME:$CODEBUILD_RESOLVED_SOURCE_VERSION" "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:$INTEGRATION_NAME-$CODEBUILD_RESOLVED_SOURCE_VERSION"
  post_build:
    commands:
      - docker push "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:$INTEGRATION_NAME-$CODEBUILD_RESOLVED_SOURCE_VERSION"
